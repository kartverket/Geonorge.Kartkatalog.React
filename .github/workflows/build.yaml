name: ImageBuild

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  DOCKER_REGISTRY: ghcr.io
  NAME: kartverket/geonorge-kartkatalog-frontend

jobs:
  build_image:
    name: Build image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      actions: read
      id-token: write

    outputs:
      version: ${{ steps.set_output.outputs.version }}
      tags: ${{ steps.meta.outputs.tags }}
      short_tag: ${{ steps.short_tag.outputs.value }}
      commit_message: ${{ steps.get_commit_message.outputs.frontend_commit_message }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Extract the latest commit message from the current repo
      - name: Get commit message
        id: get_commit_message
        run: |
          {
            echo 'frontend_commit_message<<EOF'
            git log -1 --pretty=%B
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_REGISTRY }}/${{ env.NAME }}
          tags: |
            type=ref,event=branch
            type=sha,format=short

      - name: Compute short tag
        id: short_tag
        run: echo "value=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Login to Github Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Create temporary npmrc secret
        run: |
          echo "::add-mask::${FONTAWESOME_NPM_AUTH_TOKEN}"
          umask 077
          cat <<EOF > .npmrc.github-actions
          @fortawesome:registry=https://npm.fontawesome.com/
          //npm.fontawesome.com/:_authToken=${FONTAWESOME_NPM_AUTH_TOKEN}
          EOF
        env:
          FONTAWESOME_NPM_AUTH_TOKEN: ${{ secrets.FONTAWESOME_NPM_AUTH_TOKEN }}

      - name: Build docker image and push
        id: build_image
        uses: docker/build-push-action@v6
        with:
          context: ./
          file: ./Dockerfile
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          push: true
          secret-files: |
            npmrc=.npmrc.github-actions

      - name: Summarize image digest and set output
        id: set_output
        run: |
          echo "Tags: ${{ steps.meta.outputs.tags }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Digest: ${{ steps.build_image.outputs.digest }}" >> "$GITHUB_STEP_SUMMARY"
          echo "version=${{ github.ref_name }}@${{ steps.build_image.outputs.digest }}" >> "$GITHUB_OUTPUT"

      - name: Remove temporary npmrc secret
        if: always()
        run: rm -f .npmrc.github-actions

  deploy:
    runs-on: ubuntu-latest
    needs: [build_image]
    name: Deploy
    permissions:
      contents: read
      id-token: write
    # if: github.event_name != 'pull_request'
    steps:
      - uses: octo-sts/action@f603d3be9d8dd9871a265776e625a27b00effe05
        id: octo-sts
        with:
          scope: kartverket/geonorge-apps
          identity: kartkatalog-frontend

      - name: Checkout apps repository
        uses: actions/checkout@v6
        with:
          repository: kartverket/geonorge-apps
          ref: main
          token: ${{ steps.octo-sts.outputs.token }}

      - name: Git setup for deploy
        run: |
          git config --global user.email "kartkatalog-frontend@kartverket.no"
          git config --global user.name "kartkatalog-frontend CI"

      - name: Update deployment
        env:
          COMMIT_MESSAGE: ${{ needs.build_image.outputs.commit_message }}
        run: |
          echo "\"ghcr.io/kartverket/geonorge-kartkatalog-frontend:${{ needs.build_image.outputs.short_tag }}"\" > env/atkv3-dev/geonorge-kartkatalog-dev/kartkatalog-frontend-version
          git add .
          git commit -m "$COMMIT_MESSAGE"
          git push