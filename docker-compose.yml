# for runnning locally with https, run the following command in the project root to generate self-signed certificates: 
# openssl req -x509 -nodes -newkey rsa:2048 -keyout nginx.key -out nginx.crt -days 365 -subj "/CN=localhost" -addext "subjectAltName=DNS:localhost,IP:127.0.0.1" && chmod 644 nginx.key


services:
  prerender:
    build:
      context: ./prerender
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    networks:
      - default

  kartkatalog:
    build:
      context: .
      dockerfile: Dockerfile
      secrets:
        - npmrc
    ports:
      - "${PORT:-5173}:443"
    env_file:
      - .env
    configs:
      - source: nginx_local_conf
        target: /etc/nginx/conf.d/default.conf
    volumes:
      - ./nginx.key:/etc/ssl/private/selfsigned.key
      - ./nginx.crt:/etc/ssl/certs/selfsigned.crt
    networks:
      - default

configs:
  nginx_local_conf:
    content: |
      map $$http_user_agent $$prerender_bot {
        default 0;
        ~*(googlebot|bingbot|yandex|baiduspider|facebookexternalhit|twitterbot|rogerbot|linkedinbot|embedly) 1;
      }

      map $$args $$prerender_escaped_fragment {
        default 0;
        ~(^|&)_escaped_fragment_= 1;
      }

      map $$http_user_agent $$prerender_service_agent {
        default 0;
        ~*Prerender 1;
      }

      map $$uri $$prerender_static_asset {
        default 0;
        ~*\.(js|json|css|xml|less|png|jpg|jpeg|gif|pdf|doc|txt|ico|rss|zip|mp3|rar|exe|wmv|avi|ppt|mpg|mpeg|tif|wav|mov|psd|ai|xls|mp4|m4a|swf|dat|dmg|iso|flv|m4v|torrent|ttf|woff|woff2|svg|eot)$ 1;
      }

      map "$$prerender_bot:$$prerender_escaped_fragment:$$prerender_service_agent:$$prerender_static_asset" $$prerender {
        default 0;
        ~^1:[01]:0:0$ 1;
        ~^[01]:1:0:0$ 1;
      }

      server {
        listen 80;
        listen 443 ssl;
        server_name _;

        ssl_certificate /etc/ssl/certs/selfsigned.crt;
        ssl_certificate_key /etc/ssl/private/selfsigned.key;

        root /usr/share/nginx/html;
        index index.html;

        location = /config.js {
          alias /tmp/config.js;
          add_header Cache-Control "no-store";
        }

        location = /version.js {
          alias /tmp/version.js;
          add_header Cache-Control "no-store";
        }

        location / {
          error_page 418 = /prerender-proxy;

          if ($$prerender = 1) {
            return 418;
          }

          try_files $$uri $$uri/ /index.html;
        }

        location = /prerender-proxy {
          internal;
          rewrite ^ /http://kartkatalog$$request_uri break;
          proxy_set_header Host $$host;
          proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $$scheme;
          proxy_pass http://prerender:3000;
        }

        location /assets/ {
          expires 1y;
          add_header Cache-Control "public, immutable";
        }
      }

secrets:
  npmrc:
    file: .npmrc

networks:
  default:
    driver: bridge
